<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live Form Validation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="form-container">
    <h2>Register</h2>
    <form id="signup-form">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name" required />
      <small class="error-msg" id="name-error"></small>

      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email" required />
      <small class="error-msg" id="email-error"></small>

<label>Password</label>

<div class="password-box">
  <input type="password" id="password" placeholder="Enter password" required />
  <span id="toggle-pass">👁️</span>
</div>

<small class="error-msg" id="password-error"></small>
<small id="password-strength"></small>

      <label>Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Confirm password" required />
      <small class="error-msg" id="confirm-password-error"></small>

      <button type="submit">Register</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
